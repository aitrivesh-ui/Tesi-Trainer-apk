<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d16"/>
      <stop offset="55%" stop-color="#07070c"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3dffc0"/>
      <stop offset="100%" stop-color="#00c98d"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5a0"/>
      <stop offset="100%" stop-color="#009c7a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#00e5a0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- faint ring detail -->
  <circle cx="256" cy="244" r="170" fill="none" stroke="#00e5a0" stroke-opacity="0.10" stroke-width="3"/>

  <!-- glow copy of barbell -->
  <g filter="url(#soft)" opacity="0.55">
    <rect x="118" y="186" width="276" height="26" rx="13" fill="#00e5a0"/>
  </g>

  <!-- barbell bar (top of T) -->
  <rect x="118" y="186" width="276" height="26" rx="13" fill="url(#neon)"/>

  <!-- plates: left -->
  <rect x="128" y="142" width="30" height="114" rx="11" fill="url(#neon)"/>
  <rect x="166" y="158" width="22" height="82" rx="9" fill="url(#neon)" opacity="0.85"/>
  <!-- plates: right -->
  <rect x="354" y="142" width="30" height="114" rx="11" fill="url(#neon)"/>
  <rect x="324" y="158" width="22" height="82" rx="9" fill="url(#neon)" opacity="0.85"/>

  <!-- T stem -->
  <rect x="234" y="212" width="44" height="156" rx="16" fill="url(#stem)"/>

  <!-- wordmark -->
  <text x="256" y="424" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="bold"
        font-size="58" letter-spacing="14" fill="#f2f2f7">TESI</text>
</svg>
