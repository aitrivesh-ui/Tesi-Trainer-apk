<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TESI Trainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden;background:#0a0a0f;font-family:'Inter',sans-serif;color:#f0f0f5;font-size:16px}
:root{
--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;
--accent:#00e5a0;--adim:rgba(0,229,160,0.12);
--str:#4da6ff;--sdim:rgba(77,166,255,0.12);
--pmp:#ffb347;--pdim:rgba(255,179,71,0.12);
--red:#ff4d6d;--rdim:rgba(255,77,109,0.15);
--bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.14);
--t1:#f0f0f5;--t2:#9090a8;--t3:#55556a;
}
.app{width:100%;max-width:100vw;padding-bottom:40px}
.hdr{padding:16px 16px 12px;border-bottom:1px solid var(--bdr);background:var(--bg)}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:1px}
.logo span{color:var(--t1)}
.sub{font-size:12px;color:var(--t3);margin-top:2px}
.week-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.wk-badge{font-size:12px;font-weight:700;background:var(--adim);color:var(--accent);padding:4px 12px;border-radius:20px;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.wn-btn{min-width:36px;height:36px;border:1px solid var(--bdr2);border-radius:8px;background:var(--bg3);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.wn-lbl{font-size:13px;color:var(--t2);flex:1;text-align:center}
.nav{display:flex;border-bottom:1px solid var(--bdr);background:var(--bg);position:sticky;top:0;z-index:10}
.nb{flex:1;padding:14px 8px;font-size:14px;font-weight:500;color:var(--t3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Inter',sans-serif}
.nb.on{color:var(--accent);border-bottom-color:var(--accent)}
.day-scroll{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg)}
.day-scroll::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;width:64px;padding:10px 4px;text-align:center;border:1px solid var(--bdr2);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--t2);line-height:1.3;font-family:'Inter',sans-serif}
.dtab .day-sub{font-size:10px;font-weight:400;margin-top:2px;opacity:.75}
.dtab.on{background:var(--accent);border-color:var(--accent);color:#000}
.dtab.skipped{background:var(--rdim);border-color:var(--red);color:var(--red)}
.dtab.done{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.dtab.rest{background:var(--bg2);border-color:var(--bdr);color:var(--t3)}
.sec{padding:0 14px}
.top-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;gap:8px;flex-wrap:wrap}
.focus-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.focus{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--accent);flex:1;min-width:0}
.focus-inp{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--accent);flex:1;background:var(--bg4);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;outline:none;min-width:0}
.edit-focus-btn{font-size:12px;color:var(--t3);background:var(--bg3);border:1px solid var(--bdr2);border-radius:6px;padding:5px 8px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.skip-btn{font-size:12px;color:var(--red);background:var(--rdim);border:1px solid rgba(255,77,109,0.3);border-radius:20px;padding:7px 14px;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.sbox{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:10px 4px;text-align:center}
.sv{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--t1);line-height:1}
.sl{font-size:10px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.ss{font-size:10px;color:var(--t3)}
.prog{height:4px;background:var(--bg4);border-radius:2px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.wu-strip{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.wu-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.wu-text{font-size:13px;color:var(--t2);line-height:1.5;flex:1}
.wu-text b{color:var(--t1)}
.wu-edit-inp{font-size:13px;color:var(--t2);background:var(--bg4);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;width:100%;outline:none;font-family:'Inter',sans-serif}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.leg{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.bdg{font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;letter-spacing:.3px}
.b-wu{background:rgba(255,255,255,0.06);color:var(--t3);border:1px solid var(--bdr2)}
.b-str{background:var(--sdim);color:var(--str)}
.b-hyo{background:var(--adim);color:var(--accent)}
.b-pmp{background:var(--pdim);color:var(--pmp)}
.slbl-row{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bdr);margin-top:6px;padding:12px 0 8px}
.slbl{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.add-ex-btn{font-size:11px;color:var(--accent);background:var(--adim);border:1px solid rgba(0,229,160,0.25);border-radius:6px;padding:4px 10px;cursor:pointer}
.excard{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;margin-bottom:12px;overflow:hidden}
.excard.exdone{opacity:.4}
.exhead{padding:12px 14px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exhead-left{flex:1;min-width:0}
.exnm{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--t1);line-height:1.2}
.exhint{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.4}
.exnm-inp{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--t1);background:var(--bg4);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;width:100%;outline:none}
.exhint-inp{font-size:11px;color:var(--t2);background:var(--bg4);border:1px solid var(--bdr2);border-radius:6px;padding:4px 8px;width:100%;margin-top:4px;outline:none;font-family:'Inter',sans-serif}
.ex-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.edbtn{font-size:11px;padding:4px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--bdr2);background:var(--bg3);color:var(--t2);white-space:nowrap}
.edbtn.danger{color:var(--red);border-color:rgba(255,77,109,0.3);background:var(--rdim)}
.edbtn.save{color:var(--accent);border-color:rgba(0,229,160,0.3);background:var(--adim)}
.col-hdr{display:grid;grid-template-columns:76px 1fr 60px 60px 30px;gap:4px;padding:6px 14px;background:var(--bg3);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
.ch{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;text-align:center}
.ch:first-child{text-align:left}
.setrow{display:grid;grid-template-columns:76px 1fr 60px 60px 30px;gap:4px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bdr)}
.setrow:last-of-type{border-bottom:none}
.setrow.wur{opacity:.55;background:rgba(255,255,255,0.015);border-left:3px solid var(--t3)}
.setrow.strr{border-left:3px solid var(--str)}
.setrow.hyor{border-left:3px solid var(--accent)}
.setrow.pmpr{border-left:3px solid var(--pmp)}
.setinfo{display:flex;flex-direction:column;gap:3px}
.setlbl{font-size:10px;color:var(--t3);white-space:nowrap}
.inp{background:var(--bg4);border:1px solid var(--bdr2);border-radius:8px;padding:8px 4px;font-size:14px;text-align:center;color:var(--t1);font-family:'Inter',sans-serif;width:100%}
.inp:focus{outline:none;border-color:var(--accent)}
.tgt-inp{background:var(--bg4);border:1px solid var(--bdr2);border-radius:8px;padding:8px 2px;font-size:13px;text-align:center;color:var(--t2);font-family:'Inter',sans-serif;width:100%}
.tgt-inp:focus{outline:none;border-color:var(--str)}
.inp.hit{background:rgba(0,229,160,0.1);border-color:var(--accent);color:var(--accent)}
.inp.miss{background:var(--rdim);border-color:var(--red);color:var(--red)}
.dash-cell{font-size:18px;color:var(--t3);text-align:center}
.del-set-btn{font-size:14px;color:var(--t3);background:none;border:none;cursor:pointer;padding:2px;line-height:1;text-align:center}
.del-set-btn:hover{color:var(--red)}
.done-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--bdr)}
.done-left{display:flex;align-items:center;gap:10px}
.dbtn{min-width:36px;height:36px;border:1px solid var(--bdr2);border-radius:8px;background:var(--bg3);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dbtn.on{background:var(--accent);border-color:var(--accent);color:#000}
.dlbl{font-size:13px;color:var(--t3)}
.add-set-btn{font-size:11px;color:var(--str);background:var(--sdim);border:1px solid rgba(77,166,255,0.25);border-radius:6px;padding:5px 10px;cursor:pointer}
.type-sel{background:var(--bg4);border:1px solid var(--bdr2);border-radius:6px;color:var(--t2);font-size:11px;padding:4px 4px;cursor:pointer;font-family:'Inter',sans-serif;width:100%}
.actions{display:flex;gap:10px;padding:8px 0 20px}
.rbtn{flex:1;padding:14px;border:1px solid var(--bdr2);border-radius:10px;background:var(--bg3);color:var(--t2);cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.ubtn{flex:2;padding:14px;border:1px solid var(--accent);border-radius:10px;background:var(--adim);color:var(--accent);cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;font-weight:600}
.skcard{background:var(--rdim);border:1px solid rgba(255,77,109,0.25);border-radius:14px;padding:28px 20px;text-align:center;margin-bottom:16px}
.skcard p{color:var(--t2);font-size:14px;margin-top:8px}
.unskip{margin-top:14px;padding:12px 24px;border:1px solid var(--bdr2);border-radius:10px;background:var(--bg3);color:var(--t1);cursor:pointer;font-size:14px;font-family:'Inter',sans-serif}
.restcard{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:40px 20px;text-align:center;margin:16px 0}
.restcard h3{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--t1);margin-top:12px}
.restcard p{font-size:13px;color:var(--t3);margin-top:8px;line-height:1.5}
.meal-wrap{padding:0 14px 20px}
.meal-toggle{display:flex;gap:8px;margin:14px 0}
.mtog{flex:1;padding:13px;border:1px solid var(--bdr2);border-radius:10px;background:var(--bg3);color:var(--t2);cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;font-weight:500}
.mtog.on{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.mbox{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:12px 8px;text-align:center}
.mv{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--t1)}
.ml{font-size:11px;color:var(--t3);margin-top:3px}
.water-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:12px}
.wlbl{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.glasses{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.glbtn{width:36px;height:36px;border:1px solid var(--bdr2);border-radius:8px;background:var(--bg3);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.glbtn.on{background:rgba(77,166,255,0.15);border-color:var(--str);color:var(--str)}
.wcnt{font-size:12px;color:var(--t3);margin-top:4px}
.tip{background:var(--bg3);border-left:3px solid var(--accent);padding:12px 14px;margin-bottom:14px;border-radius:0 10px 10px 0;font-size:13px;color:var(--t2);line-height:1.5}
.tip b{color:var(--t1)}
.mcard{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;margin-bottom:12px;overflow:hidden}
.mcard.eaten{opacity:.4}
.mhdr{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bdr);gap:8px}
.mnm{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--t1)}
.mkcal{font-size:11px;color:var(--t3);margin-top:2px}
.mtm{font-size:11px;background:var(--adim);color:var(--accent);padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.frow{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--bdr);gap:8px}
.frow:last-child{border-bottom:none}
.fn{font-size:13px;color:var(--t1);flex:1}
.fp{font-size:11px;color:var(--t3);white-space:nowrap}
.fnote{font-size:11px;color:var(--t3);padding:4px 14px;border-bottom:1px solid var(--bdr);font-style:italic}
.mchkrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bdr)}
/* ── Share modal ── */
.share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
.share-sheet{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--bdr2);width:100%;max-width:600px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.share-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.share-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--t1)}
.share-close{width:32px;height:32px;border:1px solid var(--bdr2);border-radius:8px;background:var(--bg3);color:var(--t2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.share-tabs{display:flex;gap:8px;padding:12px 18px 0;flex-shrink:0}
.stab{flex:1;padding:10px;border:1px solid var(--bdr2);border-radius:8px;background:var(--bg3);color:var(--t2);cursor:pointer;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;text-align:center}
.stab.on{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.share-hint{font-size:11px;color:var(--t3);padding:8px 18px 4px;flex-shrink:0;line-height:1.5}
.share-hint b{color:var(--t2)}
.share-textarea{flex:1;margin:8px 14px;padding:12px;background:var(--bg4);border:1px solid var(--bdr2);border-radius:10px;color:var(--t2);font-size:11px;font-family:'Courier New',monospace;line-height:1.6;resize:none;outline:none;overflow-y:auto;min-height:0}
.share-footer{display:flex;gap:10px;padding:12px 18px 20px;flex-shrink:0;border-top:1px solid var(--bdr)}
.share-copy{flex:2;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.share-native{flex:1;padding:13px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;color:var(--t2);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
.share-copied{background:var(--adim);border:1px solid var(--accent);color:var(--accent)}
.mchk{min-width:32px;height:32px;border:1px solid var(--bdr2);border-radius:8px;background:var(--bg3);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.mchk.on{background:var(--accent);border-color:var(--accent);color:#000}
.mchklbl{font-size:13px;color:var(--t3)}
.save-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:13px;font-weight:600;padding:8px 20px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}
.vrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.vchip{font-size:11px;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;color:var(--t2)}
.vchip b{color:var(--t1);font-weight:500}
/* ── Rest timer ── */
.rest-bar{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bdr2);border-radius:16px;padding:10px 18px;display:flex;align-items:center;gap:14px;z-index:60;min-width:260px;max-width:90vw;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.rest-type{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;min-width:60px}
.rest-count{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--accent);flex:1;text-align:center;letter-spacing:1px;line-height:1}
.rest-bar.done .rest-count{color:var(--pmp)}
.rest-skip{font-size:12px;color:var(--t3);cursor:pointer;padding:5px 10px;border:1px solid var(--bdr2);border-radius:6px;background:var(--bg4);white-space:nowrap}
/* ── PR banner ── */
.pr-banner{position:fixed;top:-90px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0d1f0d,#0a0f0a);border:1px solid var(--accent);border-radius:14px;padding:12px 20px;z-index:200;min-width:280px;max-width:90vw;transition:top .4s cubic-bezier(.34,1.56,.64,1);cursor:pointer;text-align:center;box-shadow:0 4px 32px rgba(0,229,160,.3)}
.pr-banner.show{top:14px}
.pr-banner-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--accent)}
.pr-banner-sub{font-size:12px;color:var(--t2);margin-top:3px}
/* ── PR board ── */
.pr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:150;display:flex;align-items:flex-end;justify-content:center}
.pr-sheet{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--bdr2);width:100%;max-width:600px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.pr-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.pr-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent)}
.pr-list{overflow-y:auto;flex:1;padding:0}
.pr-item{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--bdr)}
.pr-rank{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--t3);width:28px;flex-shrink:0}
.pr-exnm{font-size:13px;font-weight:500;color:var(--t1);flex:1;padding:0 10px}
.pr-vals{text-align:right;flex-shrink:0}
.pr-lift{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--accent)}
.pr-orm{font-size:10px;color:var(--t3);margin-top:1px}
.pr-date{font-size:10px;color:var(--t3)}
.pr-empty{padding:40px 20px;text-align:center;color:var(--t3);font-size:13px;line-height:1.8}
/* ── Bodyweight ── */
.bw-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);cursor:pointer;padding:3px 9px;border:1px solid var(--bdr);border-radius:20px;background:var(--bg3);vertical-align:middle;margin-left:4px}
.bw-spark{display:inline-flex;align-items:flex-end;gap:1px;height:12px}
.bw-bar{width:3px;background:var(--accent);border-radius:1px;opacity:.7;min-height:2px}
.bw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px}
.bw-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:16px;padding:22px;width:100%;max-width:340px}
.bw-head{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.bw-inp-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.bw-inp{flex:1;background:var(--bg4);border:1px solid var(--bdr2);border-radius:8px;padding:12px;font-size:22px;text-align:center;color:var(--t1);font-family:'Rajdhani',sans-serif;outline:none;font-weight:700}
.bw-inp:focus{border-color:var(--accent)}
.bw-unit{font-size:14px;color:var(--t3);flex-shrink:0}
.bw-log-list{max-height:180px;overflow-y:auto;margin-bottom:14px}
.bw-log-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.bw-log-date{color:var(--t3)}
.bw-log-wv{color:var(--t1);font-weight:600;font-family:'Rajdhani',sans-serif;font-size:15px}
.bw-log-delta{font-size:11px;margin-left:6px}
.bw-save{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
/* ── Session timer / 1RM / Overload ── */
.sess-timer{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--str);line-height:1}
.orm-chip{font-size:9px;color:var(--str);background:var(--sdim);border-radius:4px;padding:1px 5px;margin-top:2px;display:block;text-align:center;min-height:13px}
.ol-badge{font-size:10px;color:var(--accent);background:var(--adim);border:1px solid rgba(0,229,160,.3);border-radius:5px;padding:1px 6px;margin-left:5px;vertical-align:middle;display:inline-block}
/* ── Notes ── */
.day-notes-wrap{margin-bottom:16px}
.day-notes-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.day-notes-ta{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:10px 12px;color:var(--t2);font-size:13px;font-family:'Inter',sans-serif;resize:none;outline:none;min-height:58px;line-height:1.5}
.day-notes-ta:focus{border-color:var(--accent);color:var(--t1)}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">TESI <span>TRAINER</span></div>
    <div style="font-size:11px;color:var(--t3);text-align:right;line-height:1.5">75 kg &middot; 170 cm<br>Hisar, Haryana</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap">
    <div class="sub" style="margin:0">Bench 1RM ~56 kg &middot; 6-day split &middot; 6 AM</div>
    <span class="bw-chip" onclick="openBW()">&#9878; <span id="bwToday">--</span> kg<span class="bw-spark" id="bwSpark"></span></span>
    <button onclick="openPR()" style="font-size:11px;color:var(--pmp);background:var(--pdim);border:1px solid rgba(255,179,71,.3);border-radius:20px;padding:3px 10px;cursor:pointer">&#127942; PRs</button>
  </div>
  <div class="week-row">
    <button class="wn-btn" onclick="changeWeek(-1)">&#8249;</button>
    <span class="wn-lbl" id="weekLabel">Week 1</span>
    <button class="wn-btn" onclick="changeWeek(1)">&#8250;</button>
    <span class="wk-badge" id="weekBadge">WK 1</span>
  </div>
</div>

<div class="nav">
  <button class="nb on" onclick="switchTab('workout',this)" id="nb-w">&#127947; Workout</button>
  <button class="nb" onclick="switchTab('meal',this)" id="nb-m">&#127825; Meal Plan</button>
</div>

<div id="workoutTab">
  <div class="day-scroll" id="dayTabs"></div>
  <div class="sec" id="mainArea"></div>
</div>
<div id="mealTab" style="display:none">
  <div class="meal-wrap" id="mealArea"></div>
</div>

</div>

<div class="save-toast" id="saveToast">Saved &#10003;</div>

<!-- PR banner -->
<div class="pr-banner" id="prBanner" onclick="openPR()">
  <div class="pr-banner-title" id="prBannerTitle">&#127942; New PR!</div>
  <div class="pr-banner-sub" id="prBannerSub"></div>
</div>

<!-- Rest timer bar -->
<div class="rest-bar" id="restBar" style="display:none">
  <span class="rest-type" id="restTypeLbl">Rest</span>
  <span class="rest-count" id="restCount">1:30</span>
  <button class="rest-skip" onclick="stopRestTimer()">Skip</button>
</div>

<!-- PR Board -->
<div class="pr-overlay" id="prOverlay" style="display:none" onclick="if(event.target===this)closePR()">
  <div class="pr-sheet">
    <div class="pr-head">
      <span class="pr-title">&#127942; Personal Records</span>
      <button class="share-close" onclick="closePR()">&#10005;</button>
    </div>
    <div class="pr-list" id="prList"></div>
  </div>
</div>

<!-- Bodyweight log -->
<div class="bw-overlay" id="bwOverlay" style="display:none" onclick="if(event.target===this)closeBW()">
  <div class="bw-card">
    <div class="bw-head">&#9878; Body Weight <button class="share-close" onclick="closeBW()">&#10005;</button></div>
    <div class="bw-inp-row">
      <input class="bw-inp" type="number" id="bwInput" min="30" max="300" step="0.1" placeholder="75.0" inputmode="decimal">
      <span class="bw-unit">kg</span>
    </div>
    <button class="bw-save" onclick="logBW()">Log Today&#8217;s Weight</button>
    <div style="font-size:11px;color:var(--t3);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px">History</div>
    <div class="bw-log-list" id="bwLogList"></div>
  </div>
</div>

<!-- Share Modal -->
<div class="share-overlay" id="shareOverlay" style="display:none" onclick="if(event.target===this)closeShare()">
  <div class="share-sheet">
    <div class="share-head">
      <span class="share-title">&#128203; Share Progress</span>
      <button class="share-close" onclick="closeShare()">&#10005;</button>
    </div>
    <div class="share-tabs">
      <button class="stab on" id="stab-day" onclick="switchShareTab('day')">&#127947; Today</button>
      <button class="stab" id="stab-week" onclick="switchShareTab('week')">&#128197; Full Week</button>
    </div>
    <div class="share-hint" id="shareHint"></div>
    <textarea class="share-textarea" id="shareText" readonly spellcheck="false"></textarea>
    <div class="share-footer">
      <button class="share-copy" id="shareCopyBtn" onclick="copyShareText()">&#128203; Copy to Clipboard</button>
      <button class="share-native" id="shareNativeBtn" onclick="nativeShare()">&#8679; Share</button>
    </div>
  </div>
</div>

// ── State ──────────────────────────────────────────────────────────────────────
var DAYS, ST, MC, WG, curDay, curWeek, curTab, mealType, editingEx;

function loadState(){
  try{
    var savedDays=localStorage.getItem('tt_days');
    DAYS=savedDays?JSON.parse(savedDays):JSON.parse(JSON.stringify(DEFAULT_DAYS));
    var savedST=localStorage.getItem('tt_st');
    ST=savedST?JSON.parse(savedST):{};
    var savedMC=localStorage.getItem('tt_mc');
    MC=savedMC?JSON.parse(savedMC):{};
    WG=parseInt(localStorage.getItem('tt_wg'))||0;
    curDay=parseInt(localStorage.getItem('tt_curday'))||0;
    curWeek=parseInt(localStorage.getItem('tt_curweek'))||1;
    curTab=localStorage.getItem('tt_curtab')||'workout';
    mealType=localStorage.getItem('tt_mealtype')||'workout';
  }catch(e){
    DAYS=JSON.parse(JSON.stringify(DEFAULT_DAYS));
    ST={};MC={};WG=0;curDay=0;curWeek=1;curTab='workout';mealType='workout';
  }
  editingEx=null;
}

function persist(){
  try{
    localStorage.setItem('tt_days',JSON.stringify(DAYS));
    localStorage.setItem('tt_st',JSON.stringify(ST));
    localStorage.setItem('tt_mc',JSON.stringify(MC));
    localStorage.setItem('tt_wg',WG);
    localStorage.setItem('tt_curday',curDay);
    localStorage.setItem('tt_curweek',curWeek);
    localStorage.setItem('tt_curtab',curTab);
    localStorage.setItem('tt_mealtype',mealType);
  }catch(e){}
  showToast();
}

var toastTimer;
function showToast(){
  var t=document.getElementById('saveToast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},1200);
}

// ── Keys ───────────────────────────────────────────────────────────────────────
function sk(w,d,s,e,si,t){return w+'_'+d+'_'+s+'_'+e+'_'+si+'_'+t;}
function dk(w,d,s,e){return 'D_'+w+'_'+d+'_'+s+'_'+e;}
function sk2(w,d){return 'SK_'+w+'_'+d;}

function initMissingKeys(){
  for(var w=1;w<=12;w++){
    DAYS.forEach(function(day,d){
      if(day.isRest)return;
      day.sections.forEach(function(sec,s){
        sec.exercises.forEach(function(ex,e){
          if(!(dk(w,d,s,e) in ST))ST[dk(w,d,s,e)]=false;
          ex.sets.forEach(function(set,si){
            if(!(sk(w,d,s,e,si,'w') in ST)){
              if(w>1){
                var pv=ST[sk(w-1,d,s,e,si,'w')];
                ST[sk(w,d,s,e,si,'w')]=(pv!=null&&pv!=='')?pv:set.w1;
              } else {
                ST[sk(w,d,s,e,si,'w')]=set.w1;
              }
            }
            if(!(sk(w,d,s,e,si,'r') in ST))ST[sk(w,d,s,e,si,'r')]='';
          });
        });
      });
      if(!(sk2(w,d) in ST))ST[sk2(w,d)]=false;
    });
  }
}

// ── Week / Tab ─────────────────────────────────────────────────────────────────
function changeWeek(dir){
  curWeek=Math.max(1,Math.min(12,curWeek+dir));
  document.getElementById('weekLabel').textContent='Week '+curWeek;
  document.getElementById('weekBadge').textContent='WK '+curWeek;
  persist();
  renderTabs();renderMain();
}

function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('workoutTab').style.display=tab==='workout'?'':'none';
  document.getElementById('mealTab').style.display=tab==='meal'?'':'none';
  persist();
  if(tab==='meal')renderMeal();
}

// ── Day tabs ───────────────────────────────────────────────────────────────────
function renderTabs(){
  document.getElementById('dayTabs').innerHTML=DAYS.map(function(d,i){
    if(d.isRest){
      return '<button class="dtab rest'+(i===curDay?' on':'')+'" onclick="switchDay('+i+')"><div>'+d.label+'</div><div class="day-sub">REST</div></button>';
    }
    var skipped=ST[sk2(curWeek,i)];
    var allDone=true;
    d.sections.forEach(function(sec,s){sec.exercises.forEach(function(_,e){if(!ST[dk(curWeek,i,s,e)])allDone=false;});});
    var cls=skipped?'skipped':allDone?'done':'';
    var focusWord=d.focus.split(' ')[0];
    return '<button class="dtab '+cls+(i===curDay?' on':'')+'" onclick="switchDay('+i+')"><div>'+d.label+'</div><div class="day-sub">'+focusWord+'</div></button>';
  }).join('');
}

function switchDay(i){curDay=i;editingEx=null;persist();renderTabs();renderMain();}

// ── Badge helpers ──────────────────────────────────────────────────────────────
function bdg(t){
  if(t===WU)return '<span class="bdg b-wu">WU</span>';
  if(t===STR)return '<span class="bdg b-str">STR</span>';
  if(t===HYO)return '<span class="bdg b-hyo">HYO</span>';
  return '<span class="bdg b-pmp">PMP</span>';
}
function rc(t){return t===WU?'wur':t===STR?'strr':t===HYO?'hyor':'pmpr';}

// ── Edit: focus / warmup ───────────────────────────────────────────────────────
function startEditFocus(){editingEx='focus';renderMain();}
function saveFocus(){
  var inp=document.getElementById('focusInp');
  if(inp)DAYS[curDay].focus=inp.value.trim()||DAYS[curDay].focus;
  editingEx=null;persist();renderTabs();renderMain();
}
function startEditWarmup(){editingEx='warmup';renderMain();}
function saveWarmup(){
  var inp=document.getElementById('warmupInp');
  if(inp)DAYS[curDay].warmup=inp.value.trim()||DAYS[curDay].warmup;
  editingEx=null;persist();renderMain();
}

// ── Edit: exercise name/hint ───────────────────────────────────────────────────
function startEditEx(d,s,e){editingEx=d+'_'+s+'_'+e;renderMain();}
function cancelEditEx(){editingEx=null;renderMain();}
function saveExName(d,s,e){
  var nm=document.getElementById('exnm_'+s+'_'+e);
  var ht=document.getElementById('exhint_'+s+'_'+e);
  if(nm)DAYS[d].sections[s].exercises[e].name=nm.value.trim()||DAYS[d].sections[s].exercises[e].name;
  if(ht)DAYS[d].sections[s].exercises[e].hint=ht.value.trim();
  editingEx=null;persist();renderMain();
}

// ── Edit: target reps ──────────────────────────────────────────────────────────
function saveTgt(d,s,e,si,v){
  var val=parseInt(v);
  if(val>0)DAYS[d].sections[s].exercises[e].sets[si].r=val;
  persist();
}

// ── Add / delete exercise ──────────────────────────────────────────────────────
function addExercise(d,s){
  var ex={name:'New Exercise',hint:'Add form cue here',sets:[
    {t:HYO,l:'HYO 1',r:10,w1:0,tr:true},
    {t:HYO,l:'HYO 2',r:10,w1:0,tr:true},
    {t:HYO,l:'HYO 3',r:10,w1:0,tr:true}
  ]};
  DAYS[d].sections[s].exercises.push(ex);
  var e=DAYS[d].sections[s].exercises.length-1;
  editingEx=d+'_'+s+'_'+e;
  initMissingKeys();
  persist();renderMain();
}
function deleteExercise(d,s,e){
  if(!confirm('Delete "'+DAYS[d].sections[s].exercises[e].name+'"?'))return;
  DAYS[d].sections[s].exercises.splice(e,1);
  editingEx=null;persist();renderTabs();renderMain();
}

  var rEl=document.getElementById('newSetR_'+s+'_'+e);
  var wEl=document.getElementById('newSetW_'+s+'_'+e);
  var t=(typeEl?typeEl.value:HYO);
  var r=parseInt(rEl?rEl.value:10)||10;
  var wt=parseFloat(wEl?wEl.value:0)||0;
  var isWu=(t===WU);
  var count=DAYS[d].sections[s].exercises[e].sets.filter(function(x){return x.t===t;}).length+1;
  var lbl=t.toUpperCase()+' '+count;
  DAYS[d].sections[s].exercises[e].sets.push({t:t,l:lbl,r:r,w1:wt,tr:!isWu});
  initMissingKeys();
  persist();renderMain();
}
function deleteSet(d,s,e,si){

}

function saveW(w,d,s,e,si,v){ST[sk(w,d,s,e,si,'w')]=v;persist();updateStats();}
function saveR(w,d,s,e,si,tgt,inp){
  var v=inp.value;
  ST[sk(curWeek,d,s,e,si,'r')]=v;
  inp.className='inp'+(v===''?'':(parseInt(v)>=tgt?' hit':' miss'));
  persist();updateStats();
  if(v!==''){
    ensureSessStart();
    var setObj=DAYS[d].sections[s].exercises[e].sets[si];
    if(setObj.t!==WU){
      var wv=ST[sk(curWeek,d,s,e,si,'w')];
      var exName=DAYS[d].sections[s].exercises[e].name;
      var pr=checkPR(exName,wv,v);
      if(pr)flashPR(pr);
      // Update 1RM chip live
      var ormEl=document.getElementById('orm_'+s+'_'+e+'_'+si);
      if(ormEl){var wn=parseFloat(wv)||0,rn=parseInt(v)||0;ormEl.innerHTML=(wn>0&&rn>0)?'&#8776;'+epley(wn,rn)+'kg':'';}
      // Rest timer
      startRestTimer(setObj.t);
    }
    // Overload badge
    var olEl=document.getElementById('ol_'+s+'_'+e);
    if(olEl)olEl.style.display=exReadyToProgress(d,s,e)?'inline-block':'none';
  }

function toggleDone(d,s,e){ST[dk(curWeek,d,s,e)]=!ST[dk(curWeek,d,s,e)];persist();renderTabs();renderMain();}
function toggleSkip(){ST[sk2(curWeek,curDay)]=!ST[sk2(curWeek,curDay)];persist();renderTabs();renderMain();}

function resetDay(){
  if(!confirm('Reset all reps/done for this day?'))return;
  var d=curDay,w=curWeek;
  DAYS[d].sections.forEach(function(sec,s){
    sec.exercises.forEach(function(ex,e){
      ST[dk(w,d,s,e)]=false;
      ex.sets.forEach(function(_,si){ST[sk(w,d,s,e,si,'r')]='';});
    });

  persist();renderMain();
}

// ── Stats ──────────────────────────────────────────────────────────────────────
function updateStats(){
  var d=curDay,w=curWeek,day=DAYS[d];
  if(!day||day.isRest)return;
  var total=0,done=0,wsets=0,vol=0;
  day.sections.forEach(function(sec,s){
    sec.exercises.forEach(function(ex,e){
      total++;if(ST[dk(w,d,s,e)])done++;
      ex.sets.forEach(function(set,si){
        if(!set.tr)return;
        var r=parseInt(ST[sk(w,d,s,e,si,'r')])||0;
        var wv=parseFloat(ST[sk(w,d,s,e,si,'w')])||0;
        if(r>0){wsets++;vol+=r*wv;}
      });
    });
  });
  var pct=total>0?Math.round((done/total)*100):0;
  var sd=document.getElementById('sDone');
  if(sd){
    sd.textContent=done;
    document.getElementById('sTotal').textContent=total;
    document.getElementById('sSets').textContent=wsets;
    document.getElementById('sVol').textContent=Math.round(vol);
    document.getElementById('sPct').textContent=pct+'%';
    document.getElementById('pFill').style.width=pct+'%';
    updateSessDisplay();
  }
}

function dayStats(d,w){
  var day=DAYS[d];
  var total=0,done=0,wsets=0,vol=0,hitCount=0,missCount=0;
  if(day.isRest)return{total:0,done:0,wsets:0,vol:0,hitCount:0,missCount:0,pct:0};
  day.sections.forEach(function(sec,s){
    sec.exercises.forEach(function(ex,e){
      total++;if(ST[dk(w,d,s,e)])done++;
      ex.sets.forEach(function(set,si){
        if(!set.tr)return;
        var r=parseInt(ST[sk(w,d,s,e,si,'r')])||0;
        var wv=parseFloat(ST[sk(w,d,s,e,si,'w')])||0;
        if(r>0){
          wsets++;vol+=r*wv;
          if(r>=set.r)hitCount++;else missCount++;
        }
      });
    });
  });
  return{total:total,done:done,wsets:wsets,vol:Math.round(vol),hitCount:hitCount,missCount:missCount,pct:total>0?Math.round(done/total*100):0};
}

function buildDayReport(d,w){
  var day=DAYS[d];
  var today=new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var stat=dayStats(d,w);
  var isSkipped=ST[sk2(w,d)];
  var lines=[];

  lines.push('# TESI Trainer — Week '+w+' | '+day.day);
  lines.push('**Focus:** '+day.focus+'  |  **Date:** '+today);
  lines.push('**Athlete profile:** 75 kg body weight · 170 cm · Bench 1RM ~56 kg · Hisar, Haryana · 6 AM sessions');
  lines.push('');

  if(day.isRest){
    lines.push('## Rest Day');
    lines.push('No training logged. Recovery, sleep, nutrition focus.');
    lines.push('');
  } else if(isSkipped){
    lines.push('## Session Status: SKIPPED');
    lines.push('This day was marked as skipped / rest substitution.');
    lines.push('');
  } else {
    lines.push('## Session Summary');
    lines.push('| Metric | Value |');
    lines.push('|--------|-------|');
    lines.push('| Status | '+(stat.pct===100?'✅ Complete':stat.wsets>0?'🔄 In Progress':'⬜ Not Started')+' |');
    lines.push('| Exercises | '+stat.done+' / '+stat.total+' marked done |');
    lines.push('| Working sets logged | '+stat.wsets+' |');
    lines.push('| Total volume | '+stat.vol.toLocaleString()+' kg |');
    lines.push('| Sets hit target | '+stat.hitCount+' ✅ |');
    lines.push('| Sets missed target | '+stat.missCount+' ❌ |');
    lines.push('| Completion | '+stat.pct+'% |');
    lines.push('');

    day.sections.forEach(function(sec,s){
      lines.push('## '+sec.name);
      sec.exercises.forEach(function(ex,e){
        var exDone=ST[dk(w,d,s,e)];
        lines.push('');
        lines.push('### '+(exDone?'✅ ':'⬜ ')+ex.name);
        if(ex.hint)lines.push('*Cue: '+ex.hint+'*');
        lines.push('');
        lines.push('| Set | Type | Target | Weight | Reps Done | Result |');
        lines.push('|-----|------|--------|--------|-----------|--------|');
        ex.sets.forEach(function(set,si){
          var isWu=(set.t===WU);
          var typeName={wu:'Warm-up',str:'Strength',hyo:'Hypertrophy',pmp:'Pump'}[set.t]||set.t;
          var wv=ST[sk(w,d,s,e,si,'w')];wv=(wv!=null&&wv!=='')?wv+'kg':'—';
          var rv=ST[sk(w,d,s,e,si,'r')];
          var repsDone=(rv!=null&&rv!=='')?rv:'—';
          var result='—';
          if(!isWu&&rv!==''&&rv!=null){
            result=parseInt(rv)>=set.r?'✅ Hit':'❌ Miss (−'+(set.r-parseInt(rv))+')';
          }
          lines.push('| '+set.l+' | '+typeName+' | '+set.r+(set.r===1?'x':'r')+' | '+wv+' | '+repsDone+' | '+result+' |');
        });
      });
      lines.push('');
    });
  }

  lines.push('---');
  lines.push('## Context for AI Analysis');
  lines.push('- Program: 6-day PPL-style split (Mon=Chest+Tri, Tue=Back+Bi, Wed=Legs+Core, Thu=Shoulders+Traps, Fri=Arms, Sat=Full Body)');
  lines.push('- Goal: Hypertrophy with strength foundation, progressive overload every 1-2 weeks');
  lines.push('- Progression rule: When all HYO sets hit target reps, add 2.5 kg next session');
  lines.push('');
  var noteVal=ST['NOTE_'+w+'_'+d];
  if(noteVal){lines.push('## Session Notes (from athlete)');lines.push(noteVal);lines.push('');}
  lines.push('## Please Analyse');
  lines.push('1. Which exercises show missed reps — are they systematic (fatigue, too heavy) or isolated?');
  lines.push('2. Any weights I should increase or decrease for next session?');
  lines.push('3. Volume/intensity balance for this muscle group — anything to flag?');
  lines.push('4. One specific technique or pacing tip for my weakest lift today.');

  return lines.join('\n');
}

function buildWeekReport(w){
  var today=new Date().toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'});
  var lines=[];
  lines.push('# TESI Trainer — Week '+w+' Full Report');
  lines.push('**Generated:** '+today+'  |  **Athlete:** 75 kg · 170 cm · Bench 1RM ~56 kg · Hisar, Haryana');
  lines.push('');

  // Week overview table
  lines.push('## Week Overview');
  lines.push('| Day | Focus | Status | Volume | Sets | Hit% |');
  lines.push('|-----|-------|--------|--------|------|------|');
  var weekVol=0,weekSets=0,weekHit=0,weekMiss=0,trainDays=0,doneDays=0,skippedDays=0;
  DAYS.forEach(function(day,d){
    if(day.isRest){
      lines.push('| '+day.label+' | Rest | 😴 Rest | — | — | — |');
      return;
    }
    var isSkipped=ST[sk2(w,d)];
    if(isSkipped){skippedDays++;lines.push('| '+day.label+' | '+day.focus+' | ⏭ Skipped | — | — | — |');return;}
    trainDays++;
    var stat=dayStats(d,w);
    weekVol+=stat.vol;weekSets+=stat.wsets;weekHit+=stat.hitCount;weekMiss+=stat.missCount;
    var hitPct=stat.hitCount+stat.missCount>0?Math.round(stat.hitCount/(stat.hitCount+stat.missCount)*100)+'%':'—';
    var status=stat.pct===100?'✅ Done':stat.wsets>0?'🔄 Partial':'⬜ No data';
    if(stat.pct===100)doneDays++;
    lines.push('| '+day.label+' | '+day.focus+' | '+status+' | '+stat.vol.toLocaleString()+' kg | '+stat.wsets+' | '+hitPct+' |');
  });
  lines.push('');

  lines.push('## Week Totals');
  lines.push('| Metric | Value |');
  lines.push('|--------|-------|');
  lines.push('| Training days logged | '+trainDays+' / 6 |');
  lines.push('| Days fully completed | '+doneDays+' |');
  lines.push('| Days skipped | '+skippedDays+' |');
  lines.push('| Total volume | '+weekVol.toLocaleString()+' kg |');
  lines.push('| Total working sets | '+weekSets+' |');
  var totalAttempts=weekHit+weekMiss;
  lines.push('| Sets hit target | '+weekHit+' / '+totalAttempts+' ('+(totalAttempts>0?Math.round(weekHit/totalAttempts*100)+'%':'—')+') |');
  lines.push('');

  // Per-day detail
  lines.push('---');
  lines.push('## Detailed Day Logs');
  DAYS.forEach(function(day,d){
    if(day.isRest)return;
    var isSkipped=ST[sk2(w,d)];
    lines.push('');
    lines.push('### '+day.label+' — '+day.focus+(isSkipped?' *(Skipped)*':''));
    if(isSkipped)return;
    day.sections.forEach(function(sec,s){
      lines.push('**'+sec.name+'**');
      sec.exercises.forEach(function(ex,e){
        var exDone=ST[dk(w,d,s,e)];
        var setStr=ex.sets.map(function(set,si){
          if(set.t===WU)return null;
          var wv=ST[sk(w,d,s,e,si,'w')];wv=(wv!=null&&wv!=='')?wv+'kg':'?kg';
          var rv=ST[sk(w,d,s,e,si,'r')];
          var done=(rv!=null&&rv!=='')?rv+'/'+set.r:(set.t===WU?null:'—/'+set.r);
          return wv+'×'+done+(parseInt(rv)>=set.r?' ✅':rv!=null&&rv!==''?' ❌':'');
        }).filter(Boolean).join(' | ');
        lines.push('- '+(exDone?'✅':'⬜')+' **'+ex.name+'**: '+(setStr||'No data logged'));
      });
    });
  });
  lines.push('');
  lines.push('---');
  lines.push('## Context for AI Analysis');
  lines.push('- 6-day split: PPL-style with dedicated arms day and full-body Saturday');
  lines.push('- Progression: Add 2.5 kg when all working sets hit target for 2 consecutive sessions');
  lines.push('- Goal: Lean bulk — hypertrophy primary, strength secondary');
  lines.push('- Nutrition: ~2,350 kcal/training day, ~148g protein');
  lines.push('');
  lines.push('## Please Analyse My Week '+w);
  lines.push('1. **Volume & Recovery** — is weekly volume per muscle group appropriate? Any under/over-trained groups?');
  lines.push('2. **Progressive Overload** — based on hit/miss data, which lifts are ready for weight increases next week?');
  lines.push('3. **Weak Points** — which exercises show the most missed sets? Likely cause and fix?');
  lines.push('4. **Week '+( w+1)+' Recommendations** — specific weight targets for my main compounds (Bench, Row, Squat, Deadlift).');
  lines.push('5. **Recovery** — any red flags given skipped days or volume spikes?');

  return lines.join('\n');
}

var BW_LOG=[];
function loadBW(){try{var b=localStorage.getItem('tt_bwl');BW_LOG=b?JSON.parse(b):[];}catch(e){BW_LOG=[];}}
function saveBW(){try{localStorage.setItem('tt_bwl',JSON.stringify(BW_LOG));}catch(e){}}
function getBWToday(){var t=todayStr();for(var i=BW_LOG.length-1;i>=0;i--){if(BW_LOG[i].d===t)return BW_LOG[i].w;}return null;}
function openBW(){
  var cur=getBWToday();

function closeBW(){document.getElementById('bwOverlay').style.display='none';}
function logBW(){
  var inp=document.getElementById('bwInput');
  var val=parseFloat(inp.value);
  if(!val||val<20||val>300){inp.focus();return;}
  var t=todayStr();
  BW_LOG=BW_LOG.filter(function(x){return x.d!==t;});
  BW_LOG.push({d:t,w:val});
  BW_LOG.sort(function(a,b){return a.d<b.d?-1:1;});
  saveBW();renderBWLog();updateBWChip();
  closeBW();
}
function renderBWLog(){
  var el=document.getElementById('bwLogList');if(!el)return;
  var recent=BW_LOG.slice(-10).reverse();
  if(!recent.length){el.innerHTML='<div style="color:var(--t3);font-size:12px;padding:8px 0">No entries yet.</div>';return;}
  el.innerHTML=recent.map(function(e,i){
    var next=recent[i+1];
    var delta=next?(e.w-next.w):null;
    var ds=delta!=null?'<span class="bw-log-delta" style="color:'+(delta>0?'var(--red)':delta<0?'var(--accent)':'var(--t3)')+'">'+(delta>0?'+':'')+delta.toFixed(1)+'</span>':'';
    return '<div class="bw-log-row"><span class="bw-log-date">'+e.d+'</span><span class="bw-log-wv">'+e.w+' kg '+ds+'</span></div>';
  }).join('');
}
function updateBWChip(){
  var w=getBWToday();
  var el=document.getElementById('bwToday');
  if(el)el.textContent=w!=null?w:'--';
  var spark=document.getElementById('bwSpark');if(!spark)return;
  var recent=BW_LOG.slice(-10);
  if(recent.length<2){spark.innerHTML='';return;}
  var vals=recent.map(function(x){return x.w;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  spark.innerHTML=vals.map(function(v){
    var h=Math.max(2,Math.round((v-mn)/rng*12));
    return '<span class="bw-bar" style="height:'+h+'px"></span>';
  }).join('');
}

// ── PR History ─────────────────────────────────────────────────────────────────
var PR_HIST={};
function loadPR(){try{var p=localStorage.getItem('tt_prh');PR_HIST=p?JSON.parse(p):{};}catch(e){PR_HIST={}; }}
function savePR(){try{localStorage.setItem('tt_prh',JSON.stringify(PR_HIST));}catch(e){}}
function epley(w,r){var wn=parseFloat(w)||0,rn=parseInt(r)||0;return rn<=1?wn:Math.round(wn*(1+rn/30)*10)/10;}
function checkPR(exName,weight,reps){
  var wn=parseFloat(weight)||0,rn=parseInt(reps)||0;
  if(!wn||rn<=0)return false;
  var orm=epley(wn,rn);
  var cur=PR_HIST[exName];
  if(!cur||orm>cur.orm){
    PR_HIST[exName]={weight:wn,reps:rn,orm:orm,date:todayStr(),week:curWeek};
    savePR();
    return {exName:exName,weight:wn,reps:rn,orm:orm};
  }
  return false;
}
function openPR(){renderPRBoard();document.getElementById('prOverlay').style.display='flex';}
function closePR(){document.getElementById('prOverlay').style.display='none';}
function renderPRBoard(){
  var el=document.getElementById('prList');if(!el)return;
  var entries=Object.keys(PR_HIST).map(function(k){return Object.assign({name:k},PR_HIST[k]);});
  entries.sort(function(a,b){return b.orm-a.orm;});
  if(!entries.length){el.innerHTML='<div class="pr-empty">No PRs logged yet.<br><br>Start entering reps and weights &mdash;<br>your personal records will appear here automatically.</div>';return;}
  el.innerHTML=entries.map(function(e,i){
    var medals=['&#127941;','&#129353;','&#129354;'];
    var rank=i<3?medals[i]:'#'+(i+1);
    return '<div class="pr-item"><span class="pr-rank">'+rank+'</span><span class="pr-exnm">'+esc(e.name)+'</span><div class="pr-vals"><div class="pr-lift">'+e.weight+'kg &times; '+e.reps+'r</div><div class="pr-orm">est. 1RM '+e.orm+' kg</div><div class="pr-date">'+e.date+' &middot; Wk '+e.week+'</div></div></div>';
  }).join('');
}
var prBannerTimer;
function flashPR(pr){

  document.getElementById('prBannerTitle').textContent='🏆 New PR — '+pr.exName;
  document.getElementById('prBannerSub').textContent=pr.weight+'kg × '+pr.reps+' reps  |  est. 1RM '+pr.orm+' kg';
  banner.classList.add('show');
  clearTimeout(prBannerTimer);
  prBannerTimer=setTimeout(function(){banner.classList.remove('show');},3500);
}

// ── Rest Timer ─────────────────────────────────────────────────────────────────
var REST_DUR={wu:60,str:180,hyo:90,pmp:60};
var restState={active:false,remaining:0,total:0,type:'',iid:null};
function startRestTimer(type){
  clearInterval(restState.iid);
  var dur=REST_DUR[type]||90;
  restState={active:true,remaining:dur,total:dur,type:type,iid:null};
  var bar=document.getElementById('restBar');if(bar)bar.style.display='flex';
  updateRestDisplay();
  restState.iid=setInterval(function(){
    restState.remaining=Math.max(0,restState.remaining-1);
    if(restState.remaining===0){clearInterval(restState.iid);if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);}
    updateRestDisplay();
  },1000);
}
function stopRestTimer(){
  clearInterval(restState.iid);restState.active=false;
  var bar=document.getElementById('restBar');if(bar)bar.style.display='none';
}
function updateRestDisplay(){
  var bar=document.getElementById('restBar');if(!bar||bar.style.display==='none')return;
  var m=Math.floor(restState.remaining/60),s=restState.remaining%60;
  document.getElementById('restCount').textContent=restState.remaining===0?'Done!':(m+':'+(s<10?'0':'')+s);
  document.getElementById('restTypeLbl').textContent={wu:'Warm-up',str:'Strength (3 min)',hyo:'Hypertrophy (90s)',pmp:'Pump (60s)'}[restState.type]||'Rest';
  bar.classList.toggle('done',restState.remaining===0);
}

// ── Session Timer ──────────────────────────────────────────────────────────────
var sessTimerIid=null;
function getSessKey(){return 'SSTART_'+curWeek+'_'+curDay;}
function ensureSessStart(){
  var k=getSessKey();
  if(!ST[k]){ST[k]=Date.now();persist();}
  if(!sessTimerIid)sessTimerIid=setInterval(updateSessDisplay,1000);
}
function updateSessDisplay(){
  var el=document.getElementById('sessTimerDisp');if(!el)return;
  var start=ST[getSessKey()];
  if(!start){el.textContent='—';return;}
  var elapsed=Math.floor((Date.now()-start)/1000);
  var m=Math.floor(elapsed/60),s=elapsed%60;
  el.textContent=m+(s<10?':0':':')+s;
}
function resumeSessTimer(){
  var k=getSessKey();
  if(ST[k]&&!sessTimerIid)sessTimerIid=setInterval(updateSessDisplay,1000);
}

// ── Progressive Overload ───────────────────────────────────────────────────────
function exReadyToProgress(d,s,e){
  var ex=DAYS[d].sections[s].exercises[e];
  var w=curWeek,hasWorking=false,allHit=true;
  ex.sets.forEach(function(set,si){
    if(!set.tr)return;
    hasWorking=true;
    var rv=ST[sk(w,d,s,e,si,'r')];
    if(rv===''||rv==null||parseInt(rv)<set.r)allHit=false;
  });
  return hasWorking&&allHit;
}

// ── Boot ───────────────────────────────────────────────────────────────────────
loadState();
loadBW();
loadPR();
initMissingKeys();
document.getElementById('weekLabel').textContent='Week '+curWeek;
document.getElementById('weekBadge').textContent='WK '+curWeek;
updateBWChip();
if(curTab==='meal'){
  document.getElementById('workoutTab').style.display='none';
  document.getElementById('mealTab').style.display='';
  document.getElementById('nb-w').classList.remove('on');
  document.getElementById('nb-m').classList.add('on');
  renderMeal();
}
renderTabs();renderMain();
resumeSessTimer();
</script>
